<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detection Stats</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #1e293b;
      }
      .tabs {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      .tab {
        display: inline-block;
        text-decoration: none;
        color: #cbd5e1;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
      }
      .tab.active {
        color: #0f172a;
        background: #22c55e;
        border-color: #22c55e;
        font-weight: 700;
      }
      .panel {
        padding: 16px;
      }
      .stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .pill {
        background: #1e293b;
        padding: 10px 12px;
        border-radius: 8px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
        gap: 10px;
      }
      .summary-card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(300px, 1fr));
        gap: 12px;
        padding: 16px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
      }
      .camera-title {
        padding: 8px 12px;
        font-weight: 700;
        border-bottom: 1px solid #1f2937;
      }
      .camera-image {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
        background: #020617;
      }
      .muted {
        color: #94a3b8;
        font-size: 14px;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .summary-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h2 style="margin: 0 0 6px 0">DetectionStats Dashboard</h2>
      <div class="tabs">
        <a class="tab active" href="/">Последнее срабатывание</a>
        <a class="tab" href="/archive">Архив срабатываний</a>
        <a class="tab" href="/live">Live RTSP</a>
      </div>
    </header>

    <div class="panel">
      <h3>Общая статистика</h3>
      <div class="stats">
        <div class="pill">Срабатываний всего: <strong id="totalTriggers">0</strong></div>
        <div class="pill">Последнее: <strong id="lastTrigger">—</strong></div>
      </div>
    </div>

    <div class="panel">
      <h3>Последнее срабатывание</h3>
      <div id="latestMeta" class="muted">Загрузка...</div>
    </div>

    <div id="latestSummary" class="panel" style="display: none">
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <div id="latestImages" class="grid"></div>

    <script>
      const cams = ["Cam1", "Cam2", "Cam3", "Cam4"];

      function cameraSummary(event, cam) {
        return {
          people: event.payload[`${cam}_count`] ?? 0,
          wheelchair: event.payload[`${cam}_wheelchair_cnt`] ?? 0,
        };
      }

      function renderLatestEvent(event) {
        const latestMeta = document.getElementById('latestMeta');
        const summaryGrid = document.getElementById('summaryGrid');
        const latestSummary = document.getElementById('latestSummary');
        const latestImages = document.getElementById('latestImages');

        latestMeta.innerHTML = `ID: <strong>${event.id}</strong> · Время: <strong>${new Date(event.ts_utc).toLocaleString()}</strong> · Signal: <strong>${event.signal_value}</strong>`;

        summaryGrid.innerHTML = '';
        latestImages.innerHTML = '';

        for (const cam of cams) {
          const info = cameraSummary(event, cam);

          const summary = document.createElement('div');
          summary.className = 'summary-card';
          summary.innerHTML = `
            <div><strong>${cam}</strong></div>
            <div>Людей: ${info.people}</div>
            <div>Инв. коляски: ${info.wheelchair}</div>
          `;
          summaryGrid.appendChild(summary);

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="camera-title">${cam}</div>
            <img class="camera-image" src="/api/events/${event.id}/camera/${cam}.jpg" alt="${cam}" />
          `;
          latestImages.appendChild(card);
        }

        latestSummary.style.display = 'block';
      }

      async function tick() {
        const [statusRes, eventsRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/events?limit=1'),
        ]);

        const status = await statusRes.json();
        const eventsData = await eventsRes.json();

        document.getElementById('totalTriggers').textContent = status.stats.total_triggers;
        document.getElementById('lastTrigger').textContent = status.stats.last_trigger_utc
          ? new Date(status.stats.last_trigger_utc).toLocaleString()
          : '—';

        if (!eventsData.events.length) {
          document.getElementById('latestMeta').textContent = 'Срабатываний пока нет.';
          document.getElementById('latestSummary').style.display = 'none';
          document.getElementById('latestImages').innerHTML = '';
          return;
        }

        renderLatestEvent(eventsData.events[0]);
      }

      tick();
      setInterval(() => {
        tick().catch((e) => console.error('Refresh error', e));
      }, 4000);
    </script>
  </body>
</html>
