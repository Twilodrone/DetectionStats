<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detection Stats</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #1e293b;
      }
      .tabs {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      .tab {
        display: inline-block;
        text-decoration: none;
        color: #cbd5e1;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
      }
      .tab.active {
        color: #0f172a;
        background: #22c55e;
        border-color: #22c55e;
        font-weight: 700;
      }
      .panel {
        padding: 16px;
      }
      .stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .pill {
        background: #1e293b;
        padding: 10px 12px;
        border-radius: 8px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
        gap: 10px;
      }
      .summary-card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(300px, 1fr));
        gap: 12px;
      }
      .image-section {
        padding: 0 16px 16px 16px;
      }
      .section-title {
        margin: 0 0 10px 0;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
      }
      .camera-title {
        padding: 8px 12px;
        font-weight: 700;
        border-bottom: 1px solid #1f2937;
      }
      .camera-image {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
        background: #020617;
      }
      .muted {
        color: #94a3b8;
        font-size: 14px;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .summary-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h2 style="margin: 0 0 6px 0">DetectionStats Dashboard</h2>
      <div class="tabs">
        <a class="tab active" href="/">Последнее срабатывание</a>
        <a class="tab" href="/archive">Архив срабатываний</a>
        <!--<a class="tab" href="/live">Live RTSP</a>-->        
      </div>
    </header>

    <div class="panel">
      <h3>Общая статистика</h3>
      <div class="stats">
        <div class="pill">Срабатываний всего: <strong id="totalTriggers">0</strong></div>
        <div class="pill">Последнее: <strong id="lastTrigger">—</strong></div>
      </div>
    </div>

    <div class="panel">
      <h3>Последнее срабатывание</h3>
      <div id="latestMeta" class="muted">Загрузка...</div>
    </div>

    <div id="latestSummary" class="panel" style="display: none">
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <div class="image-section">
      <h3 class="section-title">Кадр, вызвавший удлинение фазы</h3>
      <div id="latestTriggerImage" class="grid"></div>
    </div>

    <script>
      let lastRenderedEventId = null;
      const DISPLAY_TIMEZONE = 'Europe/Moscow';

      function formatDisplayDateTime(tsUtc) {
        if (!tsUtc) return '—';
        const date = new Date(tsUtc);
        if (Number.isNaN(date.getTime())) return '—';
        const formatter = new Intl.DateTimeFormat('ru-RU', {
          timeZone: DISPLAY_TIMEZONE,
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        });
        return formatter.format(date);
      }

      function renderEventMeta(event) {
        const latestMeta = document.getElementById('latestMeta');
        latestMeta.innerHTML = `ID: <strong>${event.id}</strong> · Время: <strong>${formatDisplayDateTime(event.ts_utc)}</strong> · Signal: <strong>${event.signal_value}</strong>`;
      }

      function renderEventImages(event) {
        const summaryGrid = document.getElementById('summaryGrid');
        const latestSummary = document.getElementById('latestSummary');
        const latestTriggerImage = document.getElementById('latestTriggerImage');

        summaryGrid.innerHTML = '';
        latestTriggerImage.innerHTML = '';

        const triggerCam = event.payload.trigger_cam;
        const triggerSource = event.payload.trigger_source;
        const people = event.payload[`${triggerCam}_count`] ?? 0;
        const wheelchair = event.payload[`${triggerCam}_wheelchair_cnt`] ?? 0;
        const summary = document.createElement('div');
        summary.className = 'summary-card';
        summary.innerHTML = `
          <div><strong>${triggerCam}</strong></div>
          <div>Источник: ${triggerSource === 'pedestrian' ? 'Пешеходы' : 'Маломобильные'}</div>
          <div>Людей: ${people}</div>
          <div>Маломобильные: ${wheelchair}</div>
        `;
        summaryGrid.appendChild(summary);

        if (triggerCam && triggerSource) {
          const triggerCard = document.createElement('div');
          triggerCard.className = 'card';
          triggerCard.innerHTML = `
            <div class="camera-title">${triggerCam} · ${triggerSource === 'pedestrian' ? 'Пешеходы' : 'Маломобильные'}</div>
            <img class="camera-image" src="/api/events/${event.id}/camera/${triggerSource}/${triggerCam}.jpg" alt="${triggerSource} ${triggerCam}" />
          `;
          latestTriggerImage.appendChild(triggerCard);
        } else {
          latestTriggerImage.innerHTML = '<div class="muted">Нет данных о камере-триггере.</div>';
        }

        latestSummary.style.display = 'block';
      }

      function renderLatestEvent(event, shouldRenderImages) {
        renderEventMeta(event);
        if (shouldRenderImages) {
          renderEventImages(event);
        }
      }

      async function tick() {
        const [statusRes, eventsRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/events?limit=1'),
        ]);

        const status = await statusRes.json();
        const eventsData = await eventsRes.json();

        document.getElementById('totalTriggers').textContent = status.stats.total_triggers;
        document.getElementById('lastTrigger').textContent = status.stats.last_trigger_utc
          ? formatDisplayDateTime(status.stats.last_trigger_utc)
          : '—';

        if (!eventsData.events.length) {
          document.getElementById('latestMeta').textContent = 'Срабатываний пока нет.';
          document.getElementById('latestSummary').style.display = 'none';
          document.getElementById('latestTriggerImage').innerHTML = '';
          lastRenderedEventId = null;
          return;
        }

        const event = eventsData.events[0];

        if (event.id !== lastRenderedEventId) {
          renderLatestEvent(event, true);
          lastRenderedEventId = event.id;
          return;
        }

        renderLatestEvent(event, false);
      }

      tick();
      setInterval(() => {
        tick().catch((e) => console.error('Refresh error', e));
      }, 4000);
    </script>
  </body>
</html>
