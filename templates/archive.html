<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Архив срабатываний</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #1e293b;
      }
      .tabs {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      .tab {
        display: inline-block;
        text-decoration: none;
        color: #cbd5e1;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
      }
      .tab.active {
        color: #0f172a;
        background: #22c55e;
        border-color: #22c55e;
        font-weight: 700;
      }
      .panel {
        padding: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      .filters {
        margin: 12px 0;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }
      .filters label {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 14px;
      }
      .filters input[type="number"] {
        width: 84px;
        background: #0b1220;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 4px 6px;
      }
      th, td {
        border-bottom: 1px solid #1f2937;
        padding: 8px;
        text-align: left;
        font-size: 13px;
      }
      tbody tr {
        cursor: pointer;
      }
      tbody tr:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <header>
      <h2 style="margin: 0 0 6px 0">DetectionStats Dashboard</h2>
      <div class="tabs">
        <a class="tab" href="/">Последнее срабатывание</a>
        <a class="tab active" href="/archive">Архив срабатываний</a>
        <!--<a class="tab" href="/live">Live RTSP</a>-->
      </div>
    </header>

    <div class="panel">
      <h3>Последние срабатывания</h3>
      <div class="filters">
        <label>
          <input type="checkbox" id="filterWheelchairGtZero" />
          Маломобильные &gt; 0
        </label>
        <label>
          Пешеходы на любой из камер &gt;
          <input type="number" id="filterAnyCamCountGt" min="0" step="1" placeholder="n" />
        </label>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Время</th>
            <th>Cam1</th>
            <th>Cam2</th>
            <th>Cam3</th>
            <th>Cam4</th>
            <th>Маломобильные</th>
          </tr>
        </thead>
        <tbody id="eventsBody"></tbody>
      </table>
    </div>

    <script>
      const DISPLAY_TIMEZONE = 'Europe/Moscow';

      function formatDisplayDateTime(tsUtc) {
        if (!tsUtc) return '—';
        const date = new Date(tsUtc);
        if (Number.isNaN(date.getTime())) return '—';
        const formatter = new Intl.DateTimeFormat('ru-RU', {
          timeZone: DISPLAY_TIMEZONE,
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        });
        return formatter.format(date);
      }

      function buildEventsUrl() {
        const wheelchairGtZero = document.getElementById('filterWheelchairGtZero').checked;
        const anyCamCountGtRaw = document.getElementById('filterAnyCamCountGt').value;
        const params = new URLSearchParams();
        params.set('limit', '50');
        if (wheelchairGtZero) {
          params.set('wheelchair_gt_zero', '1');
        }
        if (anyCamCountGtRaw !== '') {
          params.set('any_cam_count_gt', String(Math.max(0, Number(anyCamCountGtRaw) || 0)));
        }
        return `/api/events?${params.toString()}`;
      }

      async function refreshEvents() {
        const response = await fetch(buildEventsUrl());
        const data = await response.json();
        const body = document.getElementById('eventsBody');
        body.innerHTML = '';

        for (const event of data.events) {
          const cam1 = event.payload.Cam1_count ?? 0;
          const cam2 = event.payload.Cam2_count ?? 0;
          const cam3 = event.payload.Cam3_count ?? 0;
          const cam4 = event.payload.Cam4_count ?? 0;
          const wheelchairTotal =
            (event.payload.Cam1_wheelchair_cnt ?? 0) +
            (event.payload.Cam2_wheelchair_cnt ?? 0) +
            (event.payload.Cam3_wheelchair_cnt ?? 0) +
            (event.payload.Cam4_wheelchair_cnt ?? 0);

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${event.id}</td>
            <td>${formatDisplayDateTime(event.ts_utc)}</td>
            <td>${cam1}</td>
            <td>${cam2}</td>
            <td>${cam3}</td>
            <td>${cam4}</td>
            <td>${wheelchairTotal}</td>
          `;
          tr.addEventListener('click', () => {
            window.location.href = `/events/${event.id}`;
          });
          body.appendChild(tr);
        }
      }

      document.getElementById('filterWheelchairGtZero').addEventListener('change', () => {
        refreshEvents().catch((e) => console.error('Refresh error', e));
      });
      document.getElementById('filterAnyCamCountGt').addEventListener('input', () => {
        refreshEvents().catch((e) => console.error('Refresh error', e));
      });

      refreshEvents();
      setInterval(() => {
        refreshEvents().catch((e) => console.error('Refresh error', e));
      }, 4000);
    </script>
  </body>
</html>
